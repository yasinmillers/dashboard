{% extends "base.html" %}

{% block content %}
<h3>Complaint Analytics</h3>

<p><strong>Total Complaints:</strong> {{ total_complaints }}</p>

<table class="table table-striped">
    <tr>
        <th>Status</th>
        <th>Total</th>
    </tr>
    {% for item in data %}
    <tr>
        <td>{{ item.status }}</td>
        <td>{{ item.total }}</td>
    </tr>
    {% endfor %}
</table>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<canvas id="myChart"></canvas>

<script>
const data = {
    labels: [{% for item in data %}"{{ item.status }}",{% endfor %}],
    datasets: [{
        label: 'Complaints by Status',
        data: [{% for item in data %}{{ item.total }},{% endfor %}],
    }]
};

new Chart(document.getElementById('myChart'), {
    type: 'bar',
    data: data
});
</script>

{% endblock %}
